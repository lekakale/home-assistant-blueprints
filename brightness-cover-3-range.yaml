mode: restart
blueprint:
  name: Storenautomatik 3 Phasen
  author: Lekakale
  description: |
    Passe eine Jalousie basierend auf einem Helligkeitssensor in 3 konfigurierbaren Bereichen an.
    Jeder Bereich legt eine Position und Neigung der Jalousie fest.

    **Voraussetzung:** Einen `Eingabetext`-Helfer unter
    Einstellungen → Geräte & Dienste → Helfer anlegen und unten als State Helper eintragen.
    Dieser Helfer speichert den aktuellen Bereich (low/mid/high) zwischen den Automatisierungsläufen.

    ## Current Version 1.2.0

    ## Features

    ## Configuration Options

    * Configurable brightness thresholds with hysteresis to define the 3 ranges (dark, twilight, bright).
    * Separate target position and tilt for each brightness range.
    * An input_text helper entity to persist the current brightness range across automation runs.


    ## Changelog

    ### 1.2.0
      - Proper state-machine hysteresis: action fires only when threshold is actually crossed
      - Requires an input_text helper to persist the current range

    ### 1.1.0
      - Add hysteresis to both thresholds

    ### 1.0.0
      - Initial release

  domain: automation
  input:
    brightness_sensor:
      name: Brightness Sensor
      description: Entity providing brightness (e.g., lux).
      selector:
        entity:
          filter:
            domain: sensor

    cover_entity:
      name: Cover Entity
      description: Cover(s) to control.
      selector:
        entity:
          multiple: true
          filter:
            domain: cover

    state_helper:
      name: State Helper
      description: >
        Ein `input_text`-Helfer zur Speicherung des aktuellen Bereichs (low / mid / high).
        Muss einmalig unter Einstellungen → Geräte & Dienste → Helfer als „Eingabetext" angelegt werden.
      selector:
        entity:
          filter:
            domain: input_text

    thresholds:
      name: Brightness Thresholds
      description: Configure thresholds and hysteresis for the 3 ranges.
      collapsed: true
      input:
        threshold_1:
          name: Grenze 1 (Dunkel -> Dämmerung)
          description: Dämmerung startet über diesem Wert.
          default: 20
          selector:
            number:
              min: 0
              max: 200000
              step: 1
              unit_of_measurement: lx

        hysteresis_1:
          name: Hysteresis Grenze 1
          description: Buffer around thresholds to avoid frequent toggling.
          default: 25
          selector:
            number:
              min: 0
              max: 20000
              step: 1
              unit_of_measurement: lx

        threshold_2:
          name: Grenze 2 (Dämmerung -> Hell)
          description: Tageslicht startet über diesem Wert.
          default: 600
          selector:
            number:
              min: 0
              max: 200000
              step: 1
              unit_of_measurement: lx

        hysteresis_2:
          name: Hysteresis Grenze 2
          description: Buffer around thresholds to avoid frequent toggling.
          default: 25
          selector:
            number:
              min: 0
              max: 20000
              step: 1
              unit_of_measurement: lx

    positions:
      name: Target Positions
      description: Position and tilt (0-100) per brightness range.
      collapsed: true
      input:
        position_low:
          name: Dunkel - Höhe
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

        tilt_low:
          name: Dunkel - Neigung
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

        position_mid:
          name: Dämmerung - Höhe
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

        tilt_mid:
          name: Dämmerung - Neigung
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

        position_high:
          name: Hell - Höhe
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

        tilt_high:
          name: Hell - Neigung
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"

trigger:
  - platform: state
    entity_id: !input brightness_sensor

condition:
  - condition: template
    value_template: >
      {{ trigger.to_state.state not in ['unknown', 'unavailable'] }}
  - condition: template
    value_template: >
      {{ trigger.from_state.state not in ['unknown', 'unavailable'] }}
  - condition: template
    value_template: >
      {{ trigger.from_state.state != trigger.to_state.state }}

action:
  - variables:
      brightness: "{{ trigger.to_state.state | float(0) }}"
      t1: !input threshold_1
      t2: !input threshold_2
      h1: !input hysteresis_1
      h2: !input hysteresis_2
      range_helper: !input state_helper
      current_range: "{{ states(range_helper) }}"
      # Zustandsmaschine: Bereichswechsel nur wenn Schwellenwert inkl. Hysterese vollständig überschritten.
      # Direktsprung (z. B. high → low) ist möglich wenn die Helligkeit weit genug abfällt.
      target_range: >
        {% set cr = current_range if current_range in ['low', 'mid', 'high'] else 'none' %}
        {% if cr == 'high' %}
          {% if   brightness <= (t1 - h1) %}low
          {% elif brightness <= (t2 - h2) %}mid
          {% else                         %}high
          {% endif %}
        {% elif cr == 'low' %}
          {% if   brightness >= (t2 + h2) %}high
          {% elif brightness >= (t1 + h1) %}mid
          {% else                         %}low
          {% endif %}
        {% elif cr == 'mid' %}
          {% if   brightness >= (t2 + h2) %}high
          {% elif brightness <= (t1 - h1) %}low
          {% else                         %}mid
          {% endif %}
        {% else %}
          {# Initialzustand: Helfer leer – Bereich aus aktueller Helligkeit ableiten #}
          {% if   brightness >= (t2 + h2) %}high
          {% elif brightness <= (t1 - h1) %}low
          {% else                         %}mid
          {% endif %}
        {% endif %}

  # Nur fortfahren wenn sich der Bereich tatsächlich geändert hat
  - condition: template
    value_template: "{{ target_range != current_range }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ target_range == 'low' }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input position_low
          - service: cover.set_cover_tilt_position
            target:
              entity_id: !input cover_entity
            data:
              tilt_position: !input tilt_low

      - conditions:
          - condition: template
            value_template: "{{ target_range == 'mid' }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input position_mid
          - service: cover.set_cover_tilt_position
            target:
              entity_id: !input cover_entity
            data:
              tilt_position: !input tilt_mid

      - conditions:
          - condition: template
            value_template: "{{ target_range == 'high' }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input position_high
          - service: cover.set_cover_tilt_position
            target:
              entity_id: !input cover_entity
            data:
              tilt_position: !input tilt_high

  # Aktuellen Bereich im Helfer speichern (nach den Cover-Befehlen, damit bei einem Abbruch
  # der nächste Lauf den Befehl wiederholt statt einen falschen Zustand zu übernehmen)
  - service: input_text.set_value
    target:
      entity_id: !input state_helper
    data:
      value: "{{ target_range }}"
